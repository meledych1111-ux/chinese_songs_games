<head>

<style>
:root {
  --primary: #4361ee; --primary-dark: #3a56d4;
  --accent: #ff6b35; --success: #2ecc71; --error: #e74c3c;
  --text: #2c3e50; --text-light: #7f8c8d;
  --radius: 28px; --shadow: 0 12px 35px rgba(0,0,0,0.15);
  --t1: #e53935; --t2: #1e88e5; --t3: #43a047; --t4: #fdd835; --t5: #7f8c8d;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: linear-gradient(145deg, #1a5f7a 0%, #f5d6a8 100%);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  color: var(--text); padding: 12px; min-height: 100vh; font-size: 18px;
}
.container { max-width: 850px; margin: 0 auto; padding-bottom: 30px; }
.tabs {
  display: flex; flex-wrap: wrap; gap: 8px; background: rgba(255,255,255,0.95);
  border-radius: 60px; padding: 10px; margin-bottom: 20px;
  box-shadow: var(--shadow); justify-content: center; backdrop-filter: blur(10px);
}
.tab {
  padding: 12px 14px; border-radius: 50px; font-weight: 700; font-size: 14px;
  background: #eef2f7; cursor: pointer; transition: 0.2s; text-align: center;
  min-height: 44px; display: flex; align-items: center; justify-content: center; user-select: none;
}
.tab.active { background: linear-gradient(135deg, #4361ee, #764ba2); color: white; transform: scale(1.02); }

.panel { display: none; animation: fade 0.3s ease; }
.panel.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.card {
  background: rgba(255,255,255,0.95); border-radius: var(--radius); padding: 24px 18px;
  text-align: center; box-shadow: var(--shadow); margin-bottom: 20px;
}
.big-char { font-size: 96px; font-weight: 900; line-height: 1.1; margin: 12px 0; color: var(--primary-dark); }
.pinyin { font-size: 24px; font-weight: 700; margin: 8px 0; }
.pinyin span { padding: 0 2px; }
.pinyin .t1 { color: var(--t1); } .pinyin .t2 { color: var(--t2); }
.pinyin .t3 { color: var(--t3); } .pinyin .t4 { color: var(--t4); } .pinyin .t5 { color: var(--t5); }
.meaning { font-size: 22px; background: #e3f2fd; display: inline-block; padding: 10px 22px; border-radius: 50px; margin: 12px 0; font-weight: 700; }
.emoji { font-size: 64px; margin: 10px 0; }
.badge { background: #e0f2f1; color: #00695c; padding: 6px 16px; border-radius: 25px; font-size: 13px; font-weight: 700; display: inline-block; }

.btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; }
button, .btn {
  background: linear-gradient(135deg, #ff9a44, #ff6b35); border: none; padding: 14px 22px; font-size: 16px; font-weight: 700;
  border-radius: 50px; color: white; cursor: pointer; transition: 0.2s; min-height: 52px;
}
.voice-btn { background: linear-gradient(135deg, #44aa77, #2d8a5c); }
.voice-btn.rec { background: linear-gradient(135deg, #e74c3c, #c0392b); animation: pulse 1s infinite; }
.random-btn { background: linear-gradient(135deg, #6b44ff, #4361ee); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 14px; margin: 20px 0; }
.grid-item { background: #fff; border-radius: 24px; padding: 16px 8px; text-align: center; cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.08); }
.grid-item .ch { font-size: 34px; font-weight: 800; }
.grid-item .info { font-size: 14px; color: var(--text-light); }

.filter-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 16px 0; max-height: 140px; overflow-y: auto; padding: 6px; }
.fbtn { padding: 10px 16px; background: #fff; border-radius: 35px; cursor: pointer; font-weight: 700; font-size: 13px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.fbtn.active { background: var(--primary); color: #fff; }

.grammar-card {
  background: white; border-radius: 30px; padding: 22px; margin: 20px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-left: 12px solid var(--primary); text-align: left;
}
.grammar-card:nth-child(5n+1) { border-left-color: #4361ee; background: #f0f3ff; }
.grammar-card:nth-child(5n+2) { border-left-color: #f72585; background: #fff0f6; }
.grammar-card:nth-child(5n+3) { border-left-color: #4cc9f0; background: #f0faff; }
.grammar-card:nth-child(5n+4) { border-left-color: #ff9f1c; background: #fff8f0; }
.grammar-card:nth-child(5n+5) { border-left-color: #2ec4b6; background: #f0fdfa; }

.g-title { font-size: 22px; font-weight: 900; margin-bottom: 10px; }
.g-ex { font-size: 26px; font-weight: 800; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 20px; border: 2px dashed rgba(0,0,0,0.1); margin-top:10px; color: #000; line-height: 1.4; }

canvas { background: white; border-radius: 24px; display: block; margin: 18px auto; border: 4px solid #8B4513; touch-action: none; cursor: crosshair; width: 100%; max-width: 400px; aspect-ratio: 1/1; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; backdrop-filter: blur(6px); }
.modal.active { display: flex; }
.modal-content { background: white; border-radius: 36px; padding: 24px; max-width: 92vw; max-height: 85vh; overflow-y: auto; width: 100%; position: relative; text-align: center; }
.close { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; color: #999; }

.dialog-line { padding: 14px; margin: 8px 0; border-radius: 20px; font-size: 18px; font-weight: 600; }
.q { background: #e3f2fd; color: #0d47a1; }
.a { background: #fff3e0; color: #e65100; }

@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <div class="tab active" data-tab="study">📖 Слова</div>
        <div class="tab" data-tab="numbers">🔢 Числа</div>
        <div class="tab" data-tab="colors">🎨 Цвета</div>
        <div class="tab" data-tab="dialogs">💬 Диалоги</div>
        <div class="tab" data-tab="grammar">📚 Грамматика</div>
        <div class="tab" data-tab="songs">🎵 Песни</div>
        <div class="tab" data-tab="radicals">🔤 Радикалы</div>
        <div class="tab" data-tab="notebook">📓 Тетрадь</div>
        <div class="tab" data-tab="cards">🃏 Карточки</div>
        <div class="tab" data-tab="cubes">🎲 Кубики</div>
        <div class="tab" data-tab="game">🎮 Игра</div>
        <div class="tab" data-tab="radical-words">🔗 Рад.слова</div>
        <div class="tab" data-tab="tones">🎯 Тоны</div>
    </div>

    <div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

    <!-- ПАНЕЛИ -->
    <div id="studyPanel" class="panel active">
        <div class="card">
            <div class="big-char" id="sChar">水</div>
            <div class="pinyin" id="sPinyin">shuǐ</div>
            <div class="meaning" id="sMeaning">вода</div>
            <div class="emoji" id="sEmoji">💧</div>
            <div class="badge" id="sCat">Природа</div>
        </div>
        <div class="btn-group">
            <button onclick="speak(currentW.c)">🔊 Слушать</button>
            <button class="voice-btn" onclick="startVoice(currentW.c, currentW.p, document.getElementById('sFeedback'))">🎙️ Проверить</button>
            <button onclick="nextWord()">🎲 След</button>
            <button class="random-btn" onclick="randomWord()">✨ Случайное</button>
        </div>
        <div id="sFeedback" style="text-align:center;font-weight:700;margin:10px;min-height:24px;"></div>
        <div class="filter-row" id="wFilters"></div>
        <div class="grid" id="wordGrid"></div>
    </div>

    <div id="numbersPanel" class="panel"><div class="grid" id="numGrid"></div></div>
    <div id="colorsPanel" class="panel"><div class="grid" id="colorGrid"></div></div>

    <div id="dialogsPanel" class="panel">
        <div class="card" id="dialogBox"></div>
        <div class="btn-group">
            <button onclick="prevDia()">◀ Пред</button>
            <button onclick="speakDia()">🔊 Слушать</button>
            <button onclick="nextDia()">След ▶</button>
        </div>
    </div>

    <div id="grammarPanel" class="panel"><div id="grammarBox"></div></div>
    <div id="songsPanel" class="panel"><div id="songsBox"></div></div>
    <div id="radicalsPanel" class="panel"><div class="grid" id="radGrid"></div></div>

    <div id="notebookPanel" class="panel">
        <div class="card">
            <h2 id="nTarget" style="margin-bottom:10px;">Пропишите: 水</h2>
            <div style="position:relative; width:100%; max-width:400px; margin:0 auto;">
                <canvas id="drawCanvas" width="400" height="400"></canvas>
            </div>
            <div id="nFeedback" style="font-size:22px; font-weight:900; margin:10px 0; min-height:30px;"></div>
            <div class="btn-group">
                <button style="background:#607d8b" onclick="undo()">↩️ Отмена</button>
                <button style="background:#f44336" onclick="clearCanvas()">🧽 Стереть</button>
                <button style="background:#ff9800" onclick="checkDrawing()">🎯 Проверить</button>
                <button id="ghostBtn" onclick="toggleExample()">👁️ Образец</button>
            </div>
            <div style="margin:10px 0; display:flex; align-items:center; justify-content:center; gap:10px;">
                <input type="range" id="nWidth" min="2" max="30" value="12">
                <label>Толщина пера</label>
            </div>
            <div class="btn-group">
                <button class="random-btn" onclick="randomWord()">✨ Случайное</button>
                <button onclick="speak(currentW.c)">🔊 Слушать</button>
            </div>
        </div>
    </div>

    <div id="cardsPanel" class="panel">
        <div class="card" onclick="flipCard()">
            <div id="cFront">
                <div class="big-char" id="cChar">水</div>

            </div>
            <div id="cBack" style="display:none;">
                <div class="meaning" id="cMeaning">вода</div>

            </div>
        </div>
        <div class="btn-group">
            <button onclick="flipCard()">🔄 Перевернуть</button>

        </div>
    </div>

    <div id="cubesPanel" class="panel">

            <div class="big-char" id="cubeRes">?</div>

        </div>
    </div>

    <div id="gamePanel" class="panel">
        <div class="card">
            <div class="big-char" id="gChar">?</div>

<script>
// ==================== ДАННЫЕ И СОСТОЯНИЕ ====================
const CAT_NAMES = { numbers:"🔢 Числа", greetings:"👋 Приветствия", people:"👥 Люди", family:"👨‍👩‍👧 Семья", food:"🍜 Еда", nature:"🌿 Природа", home:"🏠 Дом", verbs:"🏃 Глаголы", colors:"🎨 Цвета", weather:"🌤️ Погода", animals:"🐕 Животные", time:"⏰ Время" };
const TONES = {'ā':'t1','á':'t2','ǎ':'t3','à':'t4','ē':'t1','é':'t2','ě':'t3','è':'t4','ī':'t1','í':'t2','ǐ':'t3','ì':'t4','ō':'t1','ó':'t2','ǒ':'t3','ò':'t4','ū':'t1','ú':'t2','ǔ':'t3','ù':'t4'};

let currentW = WORDS[0], currentDia = 0, recognition = null, isRec = false;
let canvas, ctx, painting = false, undoStack = [], exampleEnabled = false;

// ==================== ОБЩИЕ ФУНКЦИИ ====================
function speak(t) { 
    window.speechSynthesis.cancel(); 
    let u = new SpeechSynthesisUtterance(t); 
    u.lang = "zh-CN"; 
    u.rate = 0.8; 
    window.speechSynthesis.speak(u); 
}

function colorP(p) {
    if(!p) return '';
    return p.split(' ').map(w => {
        let t = 't5';
        for(let c in TONES) { if(w.includes(c)) { t = TONES[c]; break; } }
        return `<span class="${t}">${w}</span>`;
    }).join(' ');
}

function updateUI() {
    // Обновление во всех вкладках сразу
    document.getElementById('sChar').innerText = currentW.c;
    document.getElementById('sPinyin').innerHTML = colorP(currentW.p);
    document.getElementById('sMeaning').innerText = currentW.m;
    document.getElementById('sEmoji').innerText = currentW.e || '📖';
    document.getElementById('sCat').innerText = CAT_NAMES[currentW.cat] || currentW.cat;

    document.getElementById('nTarget').innerText = "Пропишите: " + currentW.c;
    
    document.getElementById('cChar').innerText = currentW.c;
    document.getElementById('cPinyin').innerHTML = colorP(currentW.p);
    document.getElementById('cMeaning').innerText = currentW.m;
    document.getElementById('cEmojiBack').innerText = currentW.e || '📖';
    
    document.getElementById('cBack').style.display = 'none';
    document.getElementById('cFront').style.display = 'block';
}

function nextWord() {
    currentW = WORDS[(WORDS.indexOf(currentW) + 1) % WORDS.length];
    updateUI();
    clearCanvas();
}

function randomWord() {
    currentW = WORDS[Math.floor(Math.random() * WORDS.length)];
    updateUI();
    clearCanvas();
}

// ==================== ГОЛОС ====================
function startVoice(target, py, feed) {
    let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) { feed.innerText = "❌ Не поддерживается"; return; }
    if(isRec) return;
    recognition = new SR(); recognition.lang = "zh-CN";
    recognition.onresult = (e) => {
        let said = e.results[0][0].transcript.replace(/[.,!?;:]/g, '').trim();
        if(said === target || said.replace(/\s/g,'') === target.replace(/\s/g,'')) {
            feed.innerHTML = "✅ Верно!"; feed.style.color = "green";
        } else {
            feed.innerHTML = "❌ Вы сказали: " + said; feed.style.color = "red";
        }
    };
    recognition.onend = () => { isRec = false; document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('rec')); };
    recognition.start(); isRec = true;
    document.querySelectorAll('.voice-btn').forEach(b => b.classList.add('rec'));
    feed.innerText = "🎤 Слушаю...";
}

// ==================== ТЕТРАДЬ (ПРОФЕССИОНАЛЬНАЯ) ====================
function initCanvas() {
    canvas = document.getElementById('drawCanvas');
    ctx = canvas.getContext('2d', {willReadFrequently: true});
    drawGrid();

    function getPos(e) {
        let r = canvas.getBoundingClientRect();
        let cx = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - r.left;
        let cy = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - r.top;
        return {x: cx * (400/r.width), y: cy * (400/r.height)};
    }

    const start = (e) => {
        e.preventDefault();
        painting = true;
        undoStack.push(ctx.getImageData(0,0,400,400));
        if(undoStack.length > 30) undoStack.shift();
        let p = getPos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
    };

    const draw = (e) => {
        if(!painting) return;
        let p = getPos(e);
        ctx.lineWidth = document.getElementById('nWidth').value;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#2c3e50';
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
    };

    const end = () => { painting = false; };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', draw, {passive:false});
    canvas.addEventListener('touchend', end);
}

function drawGrid() {
    ctx.clearRect(0,0,400,400);
    ctx.strokeStyle = '#d1d1d1';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    
    // 米字格 (Mǐzìgé) - Рисовая сетка
    ctx.beginPath();
    ctx.moveTo(200, 0); ctx.lineTo(200, 400); // Вертикаль
    ctx.moveTo(0, 200); ctx.lineTo(400, 200); // Горизонталь
    ctx.moveTo(0, 0);   ctx.lineTo(400, 400); // Диагональ 1
    ctx.moveTo(400, 0); ctx.lineTo(0, 400);   // Диагональ 2
    ctx.stroke();
    
    ctx.setLineDash([]);
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 5;
    ctx.strokeRect(0, 0, 400, 400);
}

function clearCanvas() {
    ctx.clearRect(0,0,400,400);
    drawGrid();
    if(exampleEnabled) drawGhost();
    document.getElementById('nFeedback').innerText = "";
    undoStack = [];
}

function undo() { if(undoStack.length > 0) ctx.putImageData(undoStack.pop(), 0, 0); }

function toggleExample() {
    exampleEnabled = !exampleEnabled;
    document.getElementById('ghostBtn').style.background = exampleEnabled ? '#ff9800' : '';
    clearCanvas();
}

function drawGhost() {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.font = "320px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#000";
    ctx.fillText(currentW.c, 200, 220);
    ctx.restore();
}

function checkDrawing() {
    let off = document.createElement('canvas'); off.width = 400; off.height = 400;
    let octx = off.getContext('2d');
    octx.font = "320px system-ui"; octx.textAlign = "center"; octx.textBaseline = "middle";
    octx.fillText(currentW.c, 200, 220);

    let userImg = ctx.getImageData(0,0,400,400).data, targetImg = octx.getImageData(0,0,400,400).data;
    let score = 0, total = 0;
    for(let i=3; i<userImg.length; i+=4) { if(targetImg[i] > 10) { total++; if(userImg[i] > 10) score++; } }
    
    let result = (score/total) * 100, f = document.getElementById('nFeedback');
    if(result > 28) {
        f.innerText = "✅ ВЕРНО! Точность: " + Math.round(result) + "%";
        f.style.color = "green";
        speak("非常好");
    } else {
        f.innerText = "❌ НЕВЕРНО (" + Math.round(result) + "%). Попробуйте еще раз!";
        f.style.color = "red";
    }
}

// ==================== РЕНДЕРИНГ КОНТЕНТА ====================
function renderAll() {
    // Грамматика
    document.getElementById('grammarBox').innerHTML = GRAMMAR.map(g => `
        <div class="grammar-card">
            <div class="g-title">${g.title}</div>
            <div style="font-weight:600; color:#444;">${g.rule}</div>
            <div class="g-ex">${g.ex.replace(/\n/g, '<br>')}</div>
        </div>
    `).join('');

    // Сетка слов
    document.getElementById('wordGrid').innerHTML = WORDS.map(w => `<div class="grid-item" onclick="openW('${w.c}')"><div class="ch">${w.c}</div><div class="info">${w.m}</div></div>`).join('');
    
    // Фильтры
    let cats = [...new Set(WORDS.map(w => w.cat))];
    document.getElementById('wFilters').innerHTML = '<span class="fbtn active" onclick="filterW(\'all\', this)">Все</span>' + cats.map(c => `<span class="fbtn" onclick="filterW('${c}', this)">${CAT_NAMES[c]||c}</span>`).join('');
    
    // Числа и цвета
    document.getElementById('numGrid').innerHTML = WORDS.filter(w=>w.cat==='numbers').map(n=>`<div class="grid-item" onclick="speak('${n.c}')"><div class="ch">${n.c}</div><div>${n.m}</div></div>`).join('');
    document.getElementById('colorGrid').innerHTML = WORDS.filter(w=>w.cat==='colors').map(c=>`<div class="grid-item" onclick="speak('${c.c}')"><div class="ch">${c.c}</div><div>${c.m}</div></div>`).join('');
    
    // Радикалы
    document.getElementById('radGrid').innerHTML = RADICALS.map(r => `<div class="grid-item" onclick="speak('${r.s}')"><div class="ch">${r.s}</div><div class="info">${r.m}</div></div>`).join('');

    // Песни
    document.getElementById('songsBox').innerHTML = SONGS.map(s => `<div class="grammar-card"><h3>${s.title}</h3><button onclick="speakSong('${s.title}')">🎵 Петь</button></div>`).join('');
    
    renderDia();
}

function openW(c) { currentW = WORDS.find(w=>w.c===c); updateUI(); document.querySelector('[data-tab="study"]').click(); }

function filterW(c, btn) {
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
    document.getElementById('wordGrid').innerHTML = (c==='all' ? WORDS : WORDS.filter(w=>w.cat===c)).map(w => `<div class="grid-item" onclick="openW('${w.c}')"><div class="ch">${w.c}</div><div class="info">${w.m}</div></div>`).join('');
}

function renderDia() {
    let d = DIALOGS[currentDia];
    document.getElementById("dialogBox").innerHTML = `<div class="dialog-line q"><b>❓</b> ${d.q}<br><small>${d.qp}</small></div><div class="dialog-line a"><b>✅</b> ${d.a}<br><small>${d.ap}</small></div>`;
}
function prevDia() { currentDia = (currentDia - 1 + DIALOGS.length) % DIALOGS.length; renderDia(); }
function nextDia() { currentDia = (currentDia + 1) % DIALOGS.length; renderDia(); }
function speakDia() { let d = DIALOGS[currentDia]; speak(d.q); setTimeout(() => speak(d.a), 2000); }

function speakSong(t) { let s = SONGS.find(x=>x.title===t); speak(s.lines.map(l=>l.ch).join(' ')); }

function flipCard() {
    let f = document.getElementById('cFront'), b = document.getElementById('cBack');
    if(f.style.display === 'none') { f.style.display = 'block'; b.style.display = 'none'; }
    else { f.style.display = 'none'; b.style.display = 'block'; }
}

function rollCube() { let w = WORDS[Math.floor(Math.random()*WORDS.length)]; document.getElementById('cubeRes').innerText = w.c; speak(w.c); }

function newGame() {
    let w = WORDS[Math.floor(Math.random()*WORDS.length)];
    document.getElementById('gChar').innerText = w.c;
    let opts = [w.m];
    while(opts.length < 3) { let r = WORDS[Math.floor(Math.random()*WORDS.length)].m; if(!opts.includes(r)) opts.push(r); }
    opts.sort(() => Math.random() - 0.5);
    document.getElementById('gOpts').innerHTML = opts.map(o => `<button onclick="checkGame('${o}','${w.m}')">${o}</button>`).join('');
    document.getElementById('gFeed').innerText = "";
}
function checkGame(s,a) {
    let f = document.getElementById('gFeed');
    if(s === a) { f.innerText = "✅ Верно!"; f.style.color = "green"; setTimeout(newGame, 1500); }
    else { f.innerText = "❌ Ошибка!"; f.style.color = "red"; }
}

function genRadWords() {
    document.getElementById('radicalWordsList').innerHTML = RADICALS.slice(0, 30).map(r => {
        let matched = WORDS.filter(w => w.c.includes(r.s)).slice(0, 10);
        if(!matched.length) return '';
        return `<div class="card"><h3>${r.s} (${r.m})</h3><div class="grid">${matched.map(w=>`<div class="grid-item" onclick="speak('${w.c}')">${w.c}</div>`).join('')}</div></div>`;
    }).join('');
}

function genTones() {
    let groups = {};
    WORDS.slice(0, 200).forEach(w => {
        let b = w.p.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        if(!groups[b]) groups[b] = []; groups[b].push(w);
    });
    let html = "<h2>Сравнение омофонов</h2>";
    for(let k in groups) {
        if(groups[k].length > 1) {
            html += `<div style="margin:10px; padding:10px; border-bottom:1px solid #eee;"><b>${k}</b>: ` + 
            groups[k].map(w => `<span onclick="speak('${w.c}')" style="cursor:pointer; margin:0 5px; font-size:20px;">${w.c}(${w.p})</span>`).join('') + `</div>`;
        }
    }
    document.getElementById('tonesComparison').innerHTML = html;
}

// ==================== ИНИЦИАЛИЗАЦИЯ ТАБОВ ====================
document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        t.classList.add('active');
        const panelId = t.dataset.tab === 'radical-words' ? 'radical-wordsPanel' : t.dataset.tab + 'Panel';
        document.getElementById(panelId).classList.add('active');
        
        if(t.dataset.tab === 'game') newGame();
        if(t.dataset.tab === 'radical-words') genRadWords();
        if(t.dataset.tab === 'tones') genTones();
    };
});

window.onload = () => { initCanvas(); updateUI(); renderAll(); };
</script>
