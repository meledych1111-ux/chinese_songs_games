<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>🎨 КИТАЙСКИЙ ДЛЯ ДЕТЕЙ — Учимся весело!</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: linear-gradient(135deg, #FFB8B8 0%, #FFD4A8 25%, #C8E6E0 50%, #B8DFF0 75%, #D4B8E6 100%);
  font-family: 'Comic Neue', 'Segoe UI Emoji', 'PingFang SC', 'Noto Sans CJK', system-ui, 'Apple Color Emoji';
  color: #2D3436;
  padding: 16px;
  min-height: 100vh;
  font-size: 20px;
}

.container {
  max-width: 850px;
  margin: 0 auto;
  padding-bottom: 20px;
}

/* Яркие вкладки */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 60px;
  padding: 12px;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  justify-content: center;
  backdrop-filter: blur(10px);
}

.tab {
  padding: 14px 20px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 15px;
  background: #FFFFFF;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  border: none;
  color: #2D3436;
}

.tab:active {
  transform: scale(0.95);
}

.tab.active {
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white;
  box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
}

/* Панели */
.panel {
  display: none;
  animation: fadeIn 0.3s ease;
}

.panel.active {
  display: block;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Карточки */
.card {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 40px;
  padding: 24px 20px;
  text-align: center;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
  margin-bottom: 20px;
  backdrop-filter: blur(5px);
}

.big-char {
  font-size: 100px;
  font-weight: 900;
  line-height: 1.2;
  margin: 10px 0;
  color: #FF6B6B;
  text-shadow: 4px 4px 12px rgba(255, 107, 107, 0.3);
}

.pinyin {
  font-size: 26px;
  font-weight: 700;
  margin: 10px 0;
  letter-spacing: 2px;
}

.t1 { color: #FF4757; }
.t2 { color: #1E90FF; }
.t3 { color: #2ECC71; }
.t4 { color: #FFA502; }
.t5 { color: #A4B0BE; }

.meaning {
  font-size: 24px;
  background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
  display: inline-block;
  padding: 12px 24px;
  border-radius: 50px;
  margin: 10px 0;
  font-weight: 700;
  color: #E67E22;
}

.emoji {
  font-size: 65px;
  margin: 12px 0;
}

.badge {
  background: linear-gradient(135deg, #A855F7, #7C3AED);
  color: white;
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: bold;
  display: inline-block;
  margin: 8px 0;
}

/* Кнопки */
.btn-group {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-top: 15px;
}

.btn {
  background: linear-gradient(135deg, #FF8E53, #FF6B6B);
  border: none;
  padding: 14px 24px;
  font-size: 17px;
  font-weight: bold;
  border-radius: 50px;
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  min-height: 54px;
  box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
  margin: 4px;
}

.btn:active {
  transform: scale(0.95);
}

.btn-green {
  background: linear-gradient(135deg, #51CF66, #2ECC71);
  box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4);
}

/* Сетка */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 14px;
  margin: 20px 0;
}

.item {
  background: white;
  border-radius: 28px;
  padding: 16px 8px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
  border: 3px solid transparent;
  transition: all 0.2s ease;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.item:active {
  transform: scale(0.96);
}

.item .ch {
  font-size: 36px;
  font-weight: bold;
  margin: 6px 0;
}

.item .info {
  font-size: 14px;
  color: #666;
  font-weight: 500;
}

/* Фильтры */
.filter-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin: 15px 0;
}

.fbtn {
  padding: 12px 18px;
  background: white;
  border-radius: 40px;
  cursor: pointer;
  margin: 4px;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  transition: all 0.2s;
}

.fbtn:active {
  transform: scale(0.95);
}

.fbtn.active {
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white;
}

/* Диалоги */
.dialog-row {
  background: white;
  border-radius: 28px;
  padding: 20px;
  margin: 12px 0;
  text-align: left;
}

.q {
  background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
  padding: 14px;
  border-radius: 20px;
  margin: 8px 0;
  font-size: 18px;
  font-weight: 500;
}

.a {
  background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
  padding: 14px;
  border-radius: 20px;
  margin: 8px 0;
  font-size: 18px;
  font-weight: 500;
}

/* Песни */
.song-card {
  background: white;
  border-radius: 28px;
  padding: 18px;
  margin: 14px 0;
}

.song-line {
  padding: 12px 0;
  border-bottom: 2px solid #FFE0B2;
}

.song-cn {
  font-size: 20px;
  font-weight: bold;
  color: #FF6B6B;
}

.song-py {
  font-size: 15px;
  color: #888;
  margin: 5px 0;
}

.song-ru {
  font-size: 14px;
  color: #A4B0BE;
  font-style: italic;
}

/* Грамматика */
.grammar-card {
  background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
  border-radius: 28px;
  padding: 18px;
  margin: 14px 0;
  text-align: left;
  border-left: 8px solid #4CAF50;
}

.g-title {
  font-size: 20px;
  font-weight: bold;
  color: #2E7D32;
  margin-bottom: 10px;
}

.pattern {
  background: white;
  padding: 12px;
  border-radius: 16px;
  margin: 10px 0;
  font-weight: bold;
  color: #FF6B6B;
  font-size: 16px;
}

.ex {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 16px;
  font-size: 16px;
}

/* Тетрадь */
canvas {
  background: white;
  border-radius: 28px;
  display: block;
  margin: 15px auto;
  border: 4px solid #FFD4A8;
  cursor: pointer;
  touch-action: none;
  width: 100%;
  max-width: 320px;
  height: auto;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

/* Модальное окно */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

#modal.active {
  display: flex;
}

#modalContent {
  background: white;
  border-radius: 48px;
  padding: 24px;
  max-width: 90vw;
  max-height: 85vh;
  overflow-y: auto;
  width: 100%;
  position: relative;
  text-align: center;
}

.close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 36px;
  cursor: pointer;
  color: #999;
  background: none;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.close:active {
  background: #f0f0f0;
  transform: scale(0.9);
}

.assoc {
  background: linear-gradient(135deg, #FFF8E1, #FFECB3);
  border-radius: 24px;
  padding: 16px;
  margin: 14px 0;
  text-align: left;
  border-left: 6px solid #FFA502;
  font-size: 16px;
  line-height: 1.5;
}

/* Адаптив */
@media (max-width: 600px) {
  body { padding: 12px; font-size: 18px; }
  .tab { padding: 10px 14px; font-size: 13px; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .big-char { font-size: 75px; }
  .item { min-height: 95px; }
  .item .ch { font-size: 30px; }
  .btn { padding: 12px 18px; font-size: 15px; }
}

/* Анимация для кнопок */
.btn, .tab, .item, .fbtn, .close {
  cursor: pointer;
  transition: all 0.15s ease;
}

.btn:hover, .tab:hover, .item:hover, .fbtn:hover {
  transform: scale(1.02);
  filter: brightness(1.02);
}
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="words">📖 Слова</div>
    <div class="tab" data-tab="numbers">🔢 Числа</div>
    <div class="tab" data-tab="colors">🎨 Цвета</div>
    <div class="tab" data-tab="grammar">📚 Грамматика</div>
    <div class="tab" data-tab="dialogs">💬 Диалоги</div>
    <div class="tab" data-tab="songs">🎵 Песни</div>
    <div class="tab" data-tab="radicals">🔤 Радикалы</div>
    <div class="tab" data-tab="notebook">📓 Тетрадь</div>
    <div class="tab" data-tab="cards">🃏 Карточки</div>
    <div class="tab" data-tab="game">🎮 Игра</div>
  </div>

  <div id="modal"><div id="modalContent"><button class="close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>

  <!-- Панель слов -->
  <div id="wordsPanel" class="panel active">
    <div class="card">
      <div class="big-char" id="wChar">🐼</div>
      <div class="pinyin" id="wPinyin">...</div>
      <div class="meaning" id="wMean">Загрузка...</div>
      <div class="emoji" id="wEmoji">📚</div>
      <div class="badge" id="wCat">HSK 1</div>
      <div class="btn-group">
        <button class="btn" id="speakBtn">🔊 Слушать</button>
        <button class="btn btn-green" id="voiceBtn">🎙️ Проверить</button>
        <button class="btn" id="nextWordBtn">🎲 Далее</button>
      </div>
      <div id="wFeed" style="margin-top:12px; font-size:15px; color:#666;"></div>
    </div>
    <div class="filter-row" id="wFilters"></div>
    <div class="grid" id="wGrid"></div>
  </div>

  <!-- Другие панели -->
  <div id="numbersPanel" class="panel"><div class="card"><h2>🔢 Числа 1-10</h2><div id="numGrid" class="grid"></div></div></div>
  <div id="colorsPanel" class="panel"><div class="card"><h2>🎨 Цвета</h2><div id="colGrid" class="grid"></div></div></div>
  <div id="grammarPanel" class="panel"><div class="card" id="gramBox"></div></div>
  <div id="dialogsPanel" class="panel"><div class="card" id="diaBox"></div><div class="btn-group"><button class="btn" id="prevDiaBtn">◀ Назад</button><button class="btn" id="speakDiaBtn">🔊 Озвучить</button><button class="btn" id="nextDiaBtn">Вперёд ▶</button></div></div>
  <div id="songsPanel" class="panel"><div id="songBox"></div></div>
  <div id="radicalsPanel" class="panel"><div class="card" id="radCard"></div><div id="radGrid" class="grid"></div></div>
  <div id="notebookPanel" class="panel"><div class="card"><h2>📝 Тетрадь</h2><canvas id="drawCanvas" width="320" height="320"></canvas><div class="btn-group"><button class="btn" id="notebookSpeakBtn">🔊 Слово</button><button class="btn btn-green" id="notebookVoiceBtn">🎙️ Проверить</button><button class="btn" id="clearCanvasBtn">🧽 Стереть</button><button class="btn" id="nextNotebookBtn">🎲 Следующее</button></div><div class="assoc" id="nAssoc"></div></div></div>
  <div id="cardsPanel" class="panel"><div class="card"><div class="big-char" id="cChar">🐼</div><div class="pinyin" id="cPinyin">?</div><div class="btn-group"><button class="btn" id="flipCardBtn">🔄 Переворот</button><button class="btn" id="nextCardBtn">➡️ Далее</button></div><div id="cMean" class="meaning" style="display:none;"></div></div></div>
  <div id="gamePanel" class="panel"><div class="card"><h3>🎮 Выбери перевод</h3><div class="big-char" id="gChar">?</div><div id="gOpts" class="grid"></div><div id="gFeed"></div><button class="btn" id="newGameBtn">🔄 Новое</button></div></div>
</div>

<script>
// ========== ДАННЫЕ ==========
const WORDS = [
  {c:"🐼",p:"xióngmāo",m:"панда",e:"🐼",cat:"hsk1",a:"Черно-белый мишка"},
  {c:"一",p:"yī",m:"один",e:"1️⃣",cat:"numbers",a:"Одна палочка"},
  {c:"二",p:"èr",m:"два",e:"2️⃣",cat:"numbers",a:"Две линии"},
  {c:"三",p:"sān",m:"три",e:"3️⃣",cat:"numbers",a:"Три чёрточки"},
  {c:"四",p:"sì",m:"четыре",e:"4️⃣",cat:"numbers",a:"Квадратик"},
  {c:"五",p:"wǔ",m:"пять",e:"5️⃣",cat:"numbers",a:"Как часы"},
  {c:"六",p:"liù",m:"шесть",e:"6️⃣",cat:"numbers",a:"Домик с точками"},
  {c:"七",p:"qī",m:"семь",e:"7️⃣",cat:"numbers",a:"Крючок"},
  {c:"八",p:"bā",m:"восемь",e:"8️⃣",cat:"numbers",a:"Расходящиеся линии"},
  {c:"九",p:"jiǔ",m:"девять",e:"9️⃣",cat:"numbers",a:"Хвостик"},
  {c:"十",p:"shí",m:"десять",e:"🔟",cat:"numbers",a:"Крестик"},
  {c:"红",p:"hóng",m:"красный",e:"🔴",cat:"colors",a:"Цвет огня"},
  {c:"蓝",p:"lán",m:"синий",e:"🔵",cat:"colors",a:"Цвет неба"},
  {c:"绿",p:"lǜ",m:"зелёный",e:"🟢",cat:"colors",a:"Цвет травы"},
  {c:"黄",p:"huáng",m:"жёлтый",e:"🟡",cat:"colors",a:"Цвет солнца"},
  {c:"白",p:"bái",m:"белый",e:"⚪",cat:"colors",a:"Цвет снега"},
  {c:"黑",p:"hēi",m:"чёрный",e:"⚫",cat:"colors",a:"Цвет ночи"},
  {c:"猫",p:"māo",m:"кошка",e:"🐱",cat:"animals",a:"Мяу-мяу"},
  {c:"狗",p:"gǒu",m:"собака",e:"🐶",cat:"animals",a:"Гав-гав"},
  {c:"鸟",p:"niǎo",m:"птица",e:"🐦",cat:"animals",a:"Чирик-чирик"},
  {c:"鱼",p:"yú",m:"рыба",e:"🐟",cat:"animals",a:"Плавающая"},
  {c:"你好",p:"nǐhǎo",m:"здравствуй",e:"👋",cat:"basics",a:"Приветствие"},
  {c:"谢谢",p:"xièxie",m:"спасибо",e:"🙏",cat:"basics",a:"Благодарность"},
  {c:"再见",p:"zàijiàn",m:"до свидания",e:"👋",cat:"basics",a:"Прощание"},
  {c:"好",p:"hǎo",m:"хорошо",e:"👍",cat:"basics",a:"Большой палец"},
  {c:"不",p:"bù",m:"нет",e:"❌",cat:"basics",a:"Отрицание"}
];

const NUMBERS = WORDS.filter(w => w.cat === 'numbers');
const COLORS = WORDS.filter(w => w.cat === 'colors');

const DIALOGS = [
  {q:"你好！", qp:"nǐ hǎo", a:"Привет!", ap:""},
  {q:"你好吗？", qp:"nǐ hǎo ma", a:"Как дела?", ap:""},
  {q:"我很好，谢谢！", qp:"wǒ hěn hǎo, xièxie", a:"У меня всё хорошо, спасибо!", ap:""},
  {q:"再见！", qp:"zàijiàn", a:"До свидания!", ap:""}
];

const SONGS = [
  {title:"🐯 两只老虎", lines:[{ch:"两只老虎", py:"liǎng zhī lǎohǔ", ru:"Два тигра"},{ch:"跑得快", py:"pǎo de kuài", ru:"Бегут быстро"}]},
  {title:"⭐ 小星星", lines:[{ch:"一闪一闪亮晶晶", py:"yī shǎn yī shǎn liàng jīngjīng", ru:"Мерцают звёздочки"},{ch:"满天都是小星星", py:"mǎn tiān dōu shì xiǎo xīngxīng", ru:"Всё небо в звёздах"}]}
];

const GRAMMAR = [
  {title:"🎈 Порядок слов", rule:"КТО + ДЕЛАЕТ + ЧТО", ex:"我 爱 你 — Я люблю тебя"},
  {title:"❓ Вопрос с 吗", rule:"...吗?", ex:"你好吗? — Как дела?"},
  {title:"🚫 Отрицание 不", rule:"不 + глагол", ex:"我不吃 — Я не ем"}
];

const RADICALS = [
  {s:"口", m:"рот", e:"👄", ex:"吃, 喝"},
  {s:"水", m:"вода", e:"💧", ex:"河, 海"},
  {s:"火", m:"огонь", e:"🔥", ex:"烧, 炒"},
  {s:"人", m:"человек", e:"👤", ex:"你, 他"}
];

// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
let currentW = WORDS[0];
let currentDia = 0;
let synth = window.speechSynthesis;
let recognition = null;

// ========== ФУНКЦИИ ==========
function colorPinyin(p) {
  if (!p) return '';
  return p.split(' ').map(w => {
    let t = 't5';
    if (/[āēīōūǖ]/.test(w)) t = 't1';
    else if (/[áéíóúǘ]/.test(w)) t = 't2';
    else if (/[ǎěǐǒǔǚ]/.test(w)) t = 't3';
    else if (/[àèìòùǜ]/.test(w)) t = 't4';
    return `<span class="${t}">${w}</span>`;
  }).join(' ');
}

function speak(text) {
  if (!synth) return;
  synth.cancel();
  let utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.8;
  synth.speak(utterance);
}

function initRecognition() {
  if (window.SpeechRecognition || window.webkitSpeechRecognition) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.interimResults = false;
    return true;
  }
  return false;
}

function startVoice(py, feedElement) {
  if (!recognition && !initRecognition()) {
    if (feedElement) feedElement.innerHTML = "❌ Голос не поддерживается";
    return;
  }
  recognition.onresult = (e) => {
    let spoken = e.results[0][0].transcript.toLowerCase().replace(/[^a-z]/g, '');
    let expected = py.toLowerCase().replace(/[^a-z]/g, '');
    let isMatch = spoken.includes(expected) || expected.includes(spoken) || (spoken.length > 2 && expected.includes(spoken.substring(0, 3)));
    if (feedElement) {
      feedElement.innerHTML = isMatch ? "✅ Отлично! Правильно!" : `❌ Попробуй ещё: ${py}<br>Ты сказал: ${e.results[0][0].transcript}`;
    }
  };
  recognition.onerror = () => {
    if (feedElement) feedElement.innerHTML = "❌ Ошибка микрофона";
  };
  recognition.start();
  if (feedElement) feedElement.innerHTML = "🎤 Слушаю... говори!";
}

function updateWordCard() {
  document.getElementById('wChar').innerText = currentW.c;
  document.getElementById('wPinyin').innerHTML = colorPinyin(currentW.p);
  document.getElementById('wMean').innerText = currentW.m;
  document.getElementById('wEmoji').innerText = currentW.e || '📖';
  document.getElementById('wCat').innerText = currentW.cat || 'HSK 1';
  document.getElementById('cChar').innerText = currentW.c;
  document.getElementById('cPinyin').innerHTML = colorPinyin(currentW.p);
  document.getElementById('cMean').innerText = currentW.m;
  let assoc = document.getElementById('nAssoc');
  if (assoc) assoc.innerHTML = `<strong>🧠 Как запомнить:</strong><br>${currentW.a || 'Повторяй каждый день!'}`;
}

function nextWord() {
  let idx = Math.floor(Math.random() * WORDS.length);
  currentW = WORDS[idx];
  updateWordCard();
  document.getElementById('cMean').style.display = 'none';
}

function renderWordGrid(filter = 'all') {
  let list = filter === 'all' ? WORDS : WORDS.filter(w => w.cat === filter);
  let grid = document.getElementById('wGrid');
  if (!grid) return;
  grid.innerHTML = '';
  list.slice(0, 60).forEach(w => {
    let div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="ch">${w.c}</div><div class="info">${w.m}</div>`;
    div.onclick = () => {
      currentW = w;
      updateWordCard();
      document.getElementById('wordsPanel').classList.add('active');
    };
    grid.appendChild(div);
  });
}

function renderNumbers() {
  let grid = document.getElementById('numGrid');
  if (!grid) return;
  grid.innerHTML = '';
  NUMBERS.forEach(n => {
    let div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="ch">${n.c}</div><div class="info">${n.m}</div>`;
    div.onclick = () => speak(n.c);
    grid.appendChild(div);
  });
}

function renderColors() {
  let grid = document.getElementById('colGrid');
  if (!grid) return;
  grid.innerHTML = '';
  COLORS.forEach(c => {
    let div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="ch">${c.c}</div><div class="info">${c.m}</div>`;
    div.onclick = () => speak(c.c);
    grid.appendChild(div);
  });
}

function renderDialogs() {
  let box = document.getElementById('diaBox');
  if (!box) return;
  let d = DIALOGS[currentDia];
  box.innerHTML = `<div class="dialog-row"><div class="q">🗣️ ${d.q}<br><small>${d.qp}</small></div><div class="a">💬 ${d.a}</div></div>`;
}

function prevDia() { currentDia = (currentDia - 1 + DIALOGS.length) % DIALOGS.length; renderDialogs(); }
function nextDia() { currentDia = (currentDia + 1) % DIALOGS.length; renderDialogs(); }
function speakDia() { speak(DIALOGS[currentDia].q + ' ' + DIALOGS[currentDia].a); }

function renderGrammar() {
  let box = document.getElementById('gramBox');
  if (!box) return;
  box.innerHTML = GRAMMAR.map(g => `<div class="grammar-card"><div class="g-title">${g.title}</div><div class="pattern">📌 ${g.rule}</div><div class="ex">✨ ${g.ex}</div></div>`).join('');
}

function renderSongs() {
  let box = document.getElementById('songBox');
  if (!box) return;
  box.innerHTML = SONGS.map(s => `<div class="song-card"><div style="font-size:22px;font-weight:bold;text-align:center;color:#FF6B6B">${s.title}</div>${s.lines.map(l => `<div class="song-line"><div class="song-cn">${l.ch}</div><div class="song-py">${l.py}</div><div class="song-ru">${l.ru}</div></div>`).join('')}<button class="btn" style="width:100%;margin-top:12px" onclick="speak('${s.lines.map(l => l.ch).join(' ')}')">🎵 Спеть</button></div>`).join('');
}

function renderRadicals() {
  let grid = document.getElementById('radGrid');
  let card = document.getElementById('radCard');
  if (!grid) return;
  grid.innerHTML = '';
  RADICALS.forEach(r => {
    let div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="ch" style="font-size:42px">${r.s}</div><div class="info">${r.m}</div>`;
    div.onclick = () => {
      if (card) card.innerHTML = `<div class="big-char">${r.s}</div><div class="meaning">${r.m}</div><div class="emoji">${r.e || ''}</div><div class="assoc">📖 Примеры: ${r.ex}</div>`;
      speak(r.s);
    };
    grid.appendChild(div);
  });
}

// Игра
function newGame() {
  let candidates = WORDS.filter(w => w.c && w.m).slice(0, 30);
  let gameWord = candidates[Math.floor(Math.random() * candidates.length)];
  let wrongs = candidates.filter(w => w !== gameWord).sort(() => 0.5 - Math.random()).slice(0, 3);
  let options = [gameWord, ...wrongs].sort(() => 0.5 - Math.random());
  document.getElementById('gChar').innerText = gameWord.c;
  let optsDiv = document.getElementById('gOpts');
  if (!optsDiv) return;
  optsDiv.innerHTML = '';
  options.forEach(opt => {
    let btn = document.createElement('div');
    btn.className = 'item';
    btn.innerHTML = `<div class="info">${opt.m}</div>`;
    btn.onclick = () => {
      let feed = document.getElementById('gFeed');
      if (opt === gameWord) {
        if (feed) feed.innerHTML = '✅ Правильно! Молодец! 🎉';
        setTimeout(newGame, 1200);
      } else {
        if (feed) feed.innerHTML = `❌ Неправильно! ${gameWord.c} — это ${gameWord.m}`;
      }
    };
    optsDiv.appendChild(btn);
  });
}

// Тетрадь для рисования
let canvas = document.getElementById('drawCanvas');
let ctx = null;
let drawing = false;

function initCanvas() {
  if (!canvas) return;
  canvas.width = 320;
  canvas.height = 320;
  ctx = canvas.getContext('2d');
  clearCanvas();
  
  let getPos = (e) => {
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  };
  
  let startDraw = (e) => {
    e.preventDefault();
    drawing = true;
    let pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  };
  
  let draw = (e) => {
    e.preventDefault();
    if (!drawing) return;
    let pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  };
  
  let endDraw = () => { drawing = false; };
  
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw);
}

function clearCanvas() {
  if (!ctx) return;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#FFD4A8';
  ctx.lineWidth = 2;
  for (let i = 0; i <= 4; i++) {
    ctx.beginPath();
    ctx.moveTo(i * canvas.width / 4, 0);
    ctx.lineTo(i * canvas.width / 4, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * canvas.height / 4);
    ctx.lineTo(canvas.width, i * canvas.height / 4);
    ctx.stroke();
  }
  ctx.strokeStyle = '#FF6B6B';
  ctx.lineWidth = 4;
}

function flipCard() {
  let meanDiv = document.getElementById('cMean');
  if (meanDiv.style.display === 'none') {
    meanDiv.style.display = 'inline-block';
  } else {
    meanDiv.style.display = 'none';
  }
}

// ========== НАСТРОЙКА СОБЫТИЙ ==========
function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      let target = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      let targetPanel = document.getElementById(`${target}Panel`);
      if (targetPanel) targetPanel.classList.add('active');
      
      if (target === 'numbers') renderNumbers();
      if (target === 'colors') renderColors();
      if (target === 'grammar') renderGrammar();
      if (target === 'dialogs') renderDialogs();
      if (target === 'songs') renderSongs();
      if (target === 'radicals') renderRadicals();
      if (target === 'game') newGame();
      if (target === 'notebook') { updateWordCard(); initCanvas(); }
      if (target === 'cards') { updateWordCard(); document.getElementById('cMean').style.display = 'none'; }
    };
  });
}

// ========== ЗАПУСК ==========
document.addEventListener('DOMContentLoaded', () => {
  initRecognition();
  initCanvas();
  updateWordCard();
  renderWordGrid('all');
  renderNumbers();
  renderColors();
  renderGrammar();
  renderDialogs();
  renderSongs();
  renderRadicals();
  setupTabs();
  newGame();
  
  // Кнопки
  document.getElementById('speakBtn')?.addEventListener('click', () => speak(currentW.c));
  document.getElementById('voiceBtn')?.addEventListener('click', () => startVoice(currentW.p, document.getElementById('wFeed')));
  document.getElementById('nextWordBtn')?.addEventListener('click', nextWord);
  document.getElementById('prevDiaBtn')?.addEventListener('click', prevDia);
  document.getElementById('nextDiaBtn')?.addEventListener('click', nextDia);
  document.getElementById('speakDiaBtn')?.addEventListener('click', speakDia);
  document.getElementById('notebookSpeakBtn')?.addEventListener('click', () => speak(currentW.c));
  document.getElementById('notebookVoiceBtn')?.addEventListener('click', () => startVoice(currentW.p, document.getElementById('wFeed')));
  document.getElementById('clearCanvasBtn')?.addEventListener('click', clearCanvas);
  document.getElementById('nextNotebookBtn')?.addEventListener('click', nextWord);
  document.getElementById('flipCardBtn')?.addEventListener('click', flipCard);
  document.getElementById('nextCardBtn')?.addEventListener('click', () => { nextWord(); document.getElementById('cMean').style.display = 'none'; });
  document.getElementById('newGameBtn')?.addEventListener('click', newGame);
  
  // Фильтры
  let filters = ['all', 'hsk1', 'numbers', 'colors', 'animals', 'basics'];
  let fdiv = document.getElementById('wFilters');
  if (fdiv) {
    fdiv.innerHTML = '';
    ['Все', 'HSK 1', '🔢 Числа', '🎨 Цвета', '🐕 Животные', '👋 Основы'].forEach((name, i) => {
      let btn = document.createElement('div');
      btn.className = 'fbtn';
      if (i === 0) btn.classList.add('active');
      btn.innerText = name;
      btn.onclick = () => {
        document.querySelectorAll('#wFilters .fbtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderWordGrid(filters[i]);
      };
      fdiv.appendChild(btn);
    });
  }
});

window.closeModal = function() {
  document.getElementById('modal')?.classList.remove('active');
};
