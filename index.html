<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🇨🇳 Китайский с радикалами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #c8e6f0, #ffe6cc); font-family: system-ui, 'Segoe UI'; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; background: #fff5e6; border-radius: 60px; padding: 8px; margin-bottom: 20px; }
        .tab { padding: 8px 16px; border-radius: 50px; background: #f0e0c0; cursor: pointer; font-weight: bold; }
        .tab.active { background: #ff914d; color: white; }
        .panel { display: none; background: white; border-radius: 50px; padding: 20px; margin-bottom: 20px; }
        .panel.active { display: block; }
        .big-hanzi { font-size: 100px; text-align: center; font-weight: bold; }
        .pinyin { font-size: 28px; text-align: center; color: #ff6b2c; }
        .meaning { font-size: 24px; text-align: center; background: #eef4ff; display: inline-block; padding: 8px 20px; border-radius: 50px; margin: 10px auto; }
        button { background: #ffaa66; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; margin: 5px; cursor: pointer; }
        .radical-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; max-height: 400px; overflow-y: auto; }
        .radical-item { background: #fff3e0; border-radius: 30px; padding: 8px; text-align: center; font-size: 28px; }
        .dialog-line { background: #fff8f0; padding: 12px; border-radius: 30px; margin: 10px 0; }
        .feedback { background: #fff0cc; border-radius: 50px; padding: 12px; text-align: center; margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <div class="tab active" data-tab="study">📖 Учить</div>
        <div class="tab" data-tab="radicals">🔤 Радикалы</div>
        <div class="tab" data-tab="dialogs">💬 Диалоги</div>
        <div class="tab" data-tab="game">🎮 Игра</div>
    </div>

    <div id="studyPanel" class="panel active">
        <div class="big-hanzi" id="studyHanzi">猫</div>
        <div class="pinyin" id="studyPinyin">māo</div>
        <div class="meaning" id="studyMeaning">кошка</div>
        <div style="font-size: 60px; text-align: center;" id="studyEmoji">🐱</div>
        <div style="text-align:center;">
            <button id="listenBtn">🔊 Слушать</button>
            <button id="nextBtn">🎲 Дальше</button>
        </div>
        <div id="studyFeedback" class="feedback">📚 Нажимай "Дальше" и учи слова</div>
    </div>

    <div id="radicalsPanel" class="panel">
        <div class="radical-grid" id="radicalList"></div>
    </div>

    <div id="dialogsPanel" class="panel">
        <div id="dialogContent"></div>
        <button id="nextDialogBtn">🎲 Следующий диалог</button>
    </div>

    <div id="gamePanel" class="panel">
        <div class="big-hanzi" id="gameHanzi">?</div>
        <div id="gameOptions" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0;"></div>
        <div id="gameFeedback" class="feedback">⭐ Нажми на правильный перевод</div>
        <button id="newGameBtn">🔄 Новый вопрос</button>
    </div>
</div>
